version: "3.8"

# ==============================================================
# 党群素材智能检索平台 - Docker Compose 部署
# ==============================================================
# 首次部署:  cp .env.example .env && 修改密码 && docker compose up -d
# 查看状态:  docker compose ps
# 查看日志:  docker compose logs -f backend
# 停止服务:  docker compose down
# 清理数据:  docker compose down -v  (危险！会删除所有数据)
# ==============================================================

services:

  # ════════════════════════════ 基础设施 ═══════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: media-asset-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-media_asset}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-media_asset}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-media_asset}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: media-asset-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: media-asset-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-admin}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ════════════════════════════ 存储 ═══════════════════════════

  minio:
    image: minio/minio:latest
    container_name: media-asset-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ════════════════════════════ 检索引擎 ═══════════════════════

  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: media-asset-es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: media-asset-etcd
    restart: always
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 15s
      timeout: 10s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: media-asset-milvus
    restart: always
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ════════════════════════════ 应用层 ═════════════════════════

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: media-asset-backend
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      milvus:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - upload_data:/app/uploads
      - model_data:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: media-asset-celery
    restart: always
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    command: >
      celery -A app.celery_app:celery_app worker
      --loglevel=info --concurrency=4
      --queues=default,ai_queue
      --hostname=worker@%h
    volumes:
      - upload_data:/app/uploads
      - model_data:/app/models
    deploy:
      resources:
        limits:
          memory: 8G

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: media-asset-celery-beat
    restart: always
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    command: >
      celery -A app.celery_app:celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: media-asset-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  es_data:
  etcd_data:
  milvus_data:
  upload_data:
  model_data:
